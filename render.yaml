services:
  # ── Web service (Next.js — frontend + query API) ──────────────────────────
  - type: web
    name: firemind-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm test && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false

  # ── Cron jobs ─────────────────────────────────────────────────────────────
  - type: cron
    name: scrape-mtgo
    runtime: node
    plan: starter
    schedule: "0 */12 * * *"     # every 12 hours
    buildCommand: npm install && npm test
    startCommand: npm run scrape
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TOPDECK_API_KEY
        sync: false

  - type: cron
    name: sync-scryfall
    runtime: node
    plan: starter
    schedule: "0 3 * * 1"         # every Monday at 3am UTC
    buildCommand: npm install && npm test
    startCommand: npm run sync:scryfall
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: cron
    name: cluster-archetypes
    runtime: node
    plan: starter
    schedule: "30 */12 * * *"     # 30min after scrape-mtgo, every 12 hours
    buildCommand: npm install && npm test
    startCommand: npm run cluster
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: compute-snapshots
    runtime: node
    plan: starter
    schedule: "45 */12 * * *"     # 15min after cluster, every 12 hours
    buildCommand: npm install && npm test
    startCommand: npm run snapshot
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: cron
    name: sync-articles
    runtime: node
    plan: starter
    schedule: "0 4 * * 1"         # every Monday at 4am UTC (after Scryfall sync)
    buildCommand: npm install && npm test
    startCommand: npm run sync:articles
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false

  - type: cron
    name: embed-archetypes
    runtime: node
    plan: starter
    schedule: "0 1 * * *"         # daily at 1am UTC, after new archetypes are labeled
    buildCommand: npm install && npm test
    startCommand: npm run embed
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
